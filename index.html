<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIGIHERA TECH</title>

        <button id="volverClienteBtn" class="hidden">
          Volver a modo cliente

        <!-- 👤 USUARIO -->

<div id="userSection" class="hidden">

 <img id="userAvatar" class="user-avatar">

  <span id="userName"></span>

  <div class="user-menu hidden" id="userMenu">

    <button onclick="abrirCarrito()">🛒 Mi carrito</button>

    <button onclick="abrirFavoritos()">❤️ Favoritos</button>

    <button onclick="abrirPedidos()">📦 Mis pedidos</button>

    <button onclick="verHistorial()">📜 Historial</button>

    <button onclick="abrirPerfil()">⚙ Perfil</button>

    <button onclick="cerrarSesion()">🚪 Cerrar sesión</button>

  </div>

</div>

<button id="loginUserBtn">
Iniciar sesión
</button>
      </div>

    </div>
  </header>

  <!-- ====================================== -->
  <!-- 🧭 MENÚ DINÁMICO -->
  <!-- ====================================== -->

  <nav id="menuCatalogos" class="nav-desktop"></nav>

  <!-- 🔥 MENU MOBILE ACTUALIZADO -->
  <nav id="menuMobile" class="nav-mobile hidden">

    <!-- Aquí el script inyecta los catálogos dinámicos -->

    <!-- 🔐 BOTÓN ADMIN EN ANDROID -->
    <div class="mobile-admin-section">
      <button id="adminBtnMobile">Administrador</button>
      <button id="volverClienteBtnMobile" class="hidden">
        Volver a modo cliente
      </button>
    </div>

  </nav>

  <!-- ====================================== -->
  <!-- 🎞 SLIDER PRINCIPAL -->
  <!-- ====================================== -->

  <section class="slider-container" id="sliderContainer">

    <div class="slider" id="slider"></div>

    <button class="slider-btn prev" onclick="prevSlide()">❮</button>
    <button class="slider-btn next" onclick="nextSlide()">❯</button>

    <div class="slider-admin hidden" id="sliderAdmin">
      <button onclick="agregarSlide()">➕ Agregar Slide</button>
      <button onclick="restaurarSlider()">🔄 Restaurar / Crear Slider</button>
    </div>

  </section>

  <!-- ====================================== -->
  <!-- 🔐 LOGIN ADMIN -->
  <!-- ====================================== -->

  <div id="loginModal" class="modal">
    <div class="modal-content">
      <h2>Administrador</h2>

      <input type="text" id="username" placeholder="Usuario">
      <input type="password" id="password" placeholder="Contraseña">

      <button onclick="login()">Ingresar</button>
      <button onclick="closeLogin()">Cancelar</button>
    </div>
  </div>

  <!-- LOGIN USUARIO -->

<div id="userLoginModal" class="modal">

  <div class="modal-content">

    <h2>Iniciar sesión o registrarse</h2>

    <hr>

    <input type="text" id="registerUsername" placeholder="Nombre de usuario">

    <input type="email" id="registerEmail" placeholder="Correo">

    <input type="password" id="registerPassword" placeholder="Contraseña">

    <input type="file" id="registerAvatar">

    <button onclick="registrarUsuario()">
      Registrarse
    </button>

    <button onclick="cerrarLoginUsuario()">
      Cancelar
    </button>

  </div>

</div>


  <!-- PERFIL USUARIO -->

<div id="perfilModal" class="modal">

  <div class="modal-content">

    <h2>Perfil</h2>

    <img id="perfilAvatar" class="perfil-avatar">

    <input type="file" id="avatarInput">

    <input type="text" id="perfilUsername">

    <button onclick="guardarPerfil()">
      Guardar cambios
    </button>

    <button onclick="cerrarPerfil()">
      Cerrar
    </button>

  </div>

</div>

  <!-- ====================================== -->
  <!-- 🖼 MODAL IMAGEN -->
  <!-- ====================================== -->

  <div id="imgModal" class="modal">
    <div class="img-modal-content">
      <img id="imgPreview">
    </div>
  </div>

  <!-- ====================================== -->
  <!-- ⚙ PANEL ADMIN GLOBAL -->
  <!-- ====================================== -->

  <div id="adminGlobalPanel" class="admin-global hidden">
    <button onclick="crearCatalogo()">➕ Agregar Nuevo Catálogo</button>
  </div>

  <!-- ====================================== -->
  <!-- 📦 CONTENIDO PRINCIPAL -->
  <!-- ====================================== -->

  <main id="catalogos"></main>

  <!-- PANEL CARRITO -->

<div id="carritoPanel" class="modal">

  <div class="modal-content">

    <h2>🛒 Mi carrito</h2>

    <div id="carritoItems"></div>

    <h3 id="carritoTotal"></h3>

    <button onclick="enviarPedidoWhatsApp()">
      📲 Enviar pedido por WhatsApp
    </button>

    <button onclick="cerrarCarrito()">
      Cerrar
    </button>

  </div>

</div>


  <!-- FAVORITOS -->

<div id="favoritosPanel" class="modal">

  <div class="modal-content">

    <h2>❤️ Mis favoritos</h2>

    <div id="favoritosItems"></div>

    <button onclick="cerrarFavoritos()">
      Cerrar
    </button>

  </div>

</div>

  <!-- PEDIDOS -->

<div id="pedidosPanel" class="modal">

  <div class="modal-content">

    <h2>📦 Mis pedidos</h2>

    <div id="pedidosItems"></div>

    <button onclick="cerrarPedidos()">
      Cerrar
    </button>

  </div>

</div>

  <!-- HISTORIAL PEDIDOS -->

<div id="historialPanel" class="modal">

  <div class="modal-content">

    <h2>📜 Historial de pedidos</h2>

    <div id="historialItems"></div>

    <button onclick="borrarHistorial()">
      Borrar historial
    </button>

    <button onclick="cerrarHistorial()">
      Cerrar
    </button>

  </div>

</div>
