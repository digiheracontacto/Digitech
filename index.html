<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIGIHERA TECH</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ====================================== -->
  <!-- 🔷 HEADER -->
  <!-- ====================================== -->

  <header class="topbar">
    <div class="topbar-container">

      <div class="logo">DIGIHERA TECH</div>

      <!-- 🔎 BUSCADOR GLOBAL -->
      <input type="text" id="buscadorGlobal" placeholder="¿Qué estás buscando?">

      <div class="menu-toggle" id="menuToggle">&#9776;</div>

   <!-- 👤 PERFIL USUARIO -->

<div class="menu-toggle" id="menuToggle">&#9776;</div>

<div class="header-user-area">

<div class="user-profile" id="userProfile">

  <img id="userAvatar" src="" class="avatar hidden">

  <div class="user-name hidden" id="userName"></div>

  <div class="user-menu hidden" id="userMenu" data-menu="perfil">

    <button id="adminModeBtn">Modo Administrador</button>

    <button id="menuCarritoBtn">Carrito</button>

    <button id="menuFavoritosBtn">Favoritos</button>

    <button id="menuPerfilBtn">Perfil</button>

    <button id="menuHistorialBtn">Historial</button>

    <button id="logoutBtn">Cerrar sesión</button>

  </div>

</div>

</div>
  </header>

  <!-- ====================================== -->
  <!-- 🧭 MENÚ DINÁMICO -->
  <!-- ====================================== -->

  <nav id="menuCatalogos" class="nav-desktop"></nav>

  <!-- 🔥 MENU MOBILE ACTUALIZADO -->
  <nav id="menuMobile" class="nav-mobile hidden">

    <!-- Aquí el script inyecta los catálogos dinámicos -->

    <!-- 🔐 BOTÓN ADMIN EN ANDROID -->
  
  </nav>

  <!-- ====================================== -->
  <!-- 🎞 SLIDER PRINCIPAL -->
  <!-- ====================================== -->

  <section class="slider-container" id="sliderContainer">

    <div class="slider" id="slider"></div>

    <button class="slider-btn prev" onclick="prevSlide()">❮</button>
    <button class="slider-btn next" onclick="nextSlide()">❯</button>

    <div class="slider-admin hidden" id="sliderAdmin">
      <button onclick="agregarSlide()">➕ Agregar Slide</button>
      <button onclick="restaurarSlider()">🔄 Restaurar / Crear Slider</button>
    </div>

  </section>

  <!-- ====================================== -->
  <!-- 🔐 LOGIN ADMIN -->
  <!-- ====================================== -->
  
<div id="loginModal" class="modal">
    <div class="modal-content">
      <h2>Administrador</h2>

      <input type="text" id="username" placeholder="Usuario">
      <input type="password" id="password" placeholder="Contraseña">

      <button onclick="login()">Ingresar</button>
      <button onclick="closeLogin()">Cancelar</button>
    </div>
  </div>


<!-- ====================================== -->
<!-- 👤 LOGIN / REGISTRO USUARIO -->
<!-- ====================================== -->

<div id="loginUserModal" class="modal">

<div class="modal-content">

<h2>Iniciar Sesión</h2>

<input type="text" id="loginUserName" placeholder="Usuario o apodo">

<input type="password" id="loginPassword" placeholder="Contraseña">

<button id="btnLoginUser">Entrar</button>

<hr>

<h3>Registrarse</h3>

<input type="text" id="registerUserName" placeholder="Crear usuario">

<input type="password" id="registerPassword" placeholder="Contraseña">

<input type="file" id="registerPhoto">

<button id="btnRegisterUser">Crear Cuenta</button>

<button onclick="cerrarLoginUsuario()">Cancelar</button>

</div>

</div>
  
  <!-- ====================================== -->
  <!-- 🖼 MODAL IMAGEN -->
  <!-- ====================================== -->

  <div id="imgModal" class="modal">
    <div class="img-modal-content">
      <img id="imgPreview">
    </div>
  </div>

  <!-- ====================================== -->
<!-- 🛒 PANEL CARRITO -->
<!-- ====================================== -->

<div id="carritoPanel" class="modal">

<div class="modal-content">

<h2>Carrito</h2>

<div id="carritoItems"></div>

<h3>Total: $<span id="carritoTotal">0</span></h3>

<button id="btnEnviarPedido">Enviar pedido por WhatsApp</button>

<button onclick="cerrarCarrito()">Cerrar</button>

</div>

</div>

  <!-- ====================================== -->
<!-- ❤️ FAVORITOS -->
<!-- ====================================== -->

<div id="favoritosPanel" class="modal">

<div class="modal-content">

<h2>Favoritos</h2>

<div id="favoritosItems"></div>

<button onclick="cerrarFavoritos()">Cerrar</button>

</div>

</div>

  <!-- ====================================== -->
<!-- 👤 PERFIL -->
<!-- ====================================== -->

<div id="perfilPanel" class="modal">

<div class="modal-content">

<h2>Perfil</h2>

<input type="text" id="perfilNombre">

<input type="file" id="perfilFoto">

<input type="password" id="perfilPassActual" placeholder="Contraseña actual">

<input type="password" id="perfilPassNueva" placeholder="Nueva contraseña">

<input type="password" id="perfilPassConfirmar" placeholder="Confirmar contraseña">

<button id="guardarPerfilBtn">Guardar cambios</button>

<button onclick="cerrarPerfil()">Cerrar</button>

</div>

</div> 

  <!-- ====================================== -->
<!-- 📦 HISTORIAL PEDIDOS -->
<!-- ====================================== -->

<div id="historialPanel" class="modal">

<div class="modal-content">

<h2>Historial de pedidos</h2>

<div id="historialPedidos"></div>

<button onclick="cerrarHistorial()">Cerrar</button>

</div>

</div>
  <!-- ====================================== -->
  <!-- ⚙ PANEL ADMIN GLOBAL -->
  <!-- ====================================== -->

  <div id="adminGlobalPanel" class="admin-global hidden">
    <button onclick="crearCatalogo()">➕ Agregar Nuevo Catálogo</button>
  </div>

  <!-- ====================================== -->
  <!-- 📦 CONTENIDO PRINCIPAL -->
  <!-- ====================================== -->

  <main id="catalogos"></main>

  <!-- SCRIPT PRINCIPAL -->
  <script src="script.js" defer></script>

</body>

</html>
