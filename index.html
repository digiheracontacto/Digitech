<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIGIHERA TECH</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ====================================== -->
  <!-- 🔷 HEADER -->
  <!-- ====================================== -->

  <header class="topbar">
    <div class="topbar-container">

      <div class="logo">DIGIHERA TECH</div>

      <!-- 🔎 BUSCADOR GLOBAL -->
      <input type="text" id="buscadorGlobal" placeholder="¿Qué estás buscando?">

      <div class="menu-toggle" id="menuToggle">&#9776;</div>

  <div class="perfil-area" id="perfilArea">

<img id="userAvatar" class="avatar hidden" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

<span id="userName" class="hidden"></span>

<button id="loginBtn" onclick="abrirLoginUsuario()">Iniciar sesión</button>

<button id="carritoIcon" onclick="abrirCarrito()" class="hidden">
🛒 <span id="carritoCount">0</span>
</button>

<div id="perfilMenu" class="perfil-menu hidden">

<button onclick="document.getElementById('loginModal').style.display='flex'">
Modo Administrador
</button>

<button onclick="abrirCarrito()">
Carrito (<span id="menuCarritoCount">0</span>)
</button>

<button onclick="abrirFavoritos()">Favoritos</button>

<button onclick="abrirPerfil()">Perfil</button>

<button onclick="abrirHistorial()">Historial</button>

<button onclick="cerrarSesion()">Cerrar sesión</button>

</div>

</div>
    </div>
  </header>

  <!-- ====================================== -->
  <!-- 🧭 MENÚ DINÁMICO -->
  <!-- ====================================== -->

  <nav id="menuCatalogos" class="nav-desktop"></nav>

  <!-- 🔥 MENU MOBILE ACTUALIZADO -->
  <nav id="menuMobile" class="nav-mobile hidden">

    <!-- Aquí el script inyecta los catálogos dinámicos -->

    <!-- 🔐 BOTÓN ADMIN EN ANDROID -->
    <div class="mobile-admin-section">
      <button id="adminBtnMobile">Administrador</button>
      <button id="volverClienteBtnMobile" class="hidden">
        Volver a modo cliente
      </button>
    </div>

  </nav>

  <!-- ====================================== -->
  <!-- 🎞 SLIDER PRINCIPAL -->
  <!-- ====================================== -->

  <section class="slider-container" id="sliderContainer">

    <div class="slider" id="slider"></div>

    <button class="slider-btn prev" onclick="prevSlide()">❮</button>
    <button class="slider-btn next" onclick="nextSlide()">❯</button>

    <div class="slider-admin hidden" id="sliderAdmin">
      <button onclick="agregarSlide()">➕ Agregar Slide</button>
      <button onclick="restaurarSlider()">🔄 Restaurar / Crear Slider</button>
    </div>

  </section>

  <!-- ====================================== -->
  <!-- 🔐 LOGIN ADMIN -->
  <!-- ====================================== -->

  <div id="loginModal" class="modal">
    <div class="modal-content">
      <h2>Administrador</h2>

      <input type="text" id="username" placeholder="Usuario">
      <div class="password-box">
<input id="adminPass" type="password" placeholder="Contraseña">
<button type="button" onclick="togglePass('adminPass')">👁</button>
</div>

      <button onclick="login()">Ingresar</button>
      <button onclick="closeLogin()">Cancelar</button>
    </div>
  </div>

  <!-- ====================================== -->
  <!-- 🖼 MODAL IMAGEN -->
  <!-- ====================================== -->

  <div id="imgModal" class="modal">
    <div class="img-modal-content slider-imagen">

<img id="imgPreview">

<button class="img-btn prev" id="imgPrev">❮</button>

<button class="img-btn next" id="imgNext">❯</button>

</div>
  </div>
<!-- ====================================== -->
<!-- 👤 LOGIN / REGISTRO USUARIO -->
<!-- ====================================== -->

<div id="loginUsuarioModal" class="modal">

<div class="modal-content">

<h2>Cuenta</h2>

<input id="loginUser" placeholder="Usuario">

<div class="password-box">
<input id="loginPass" type="password" placeholder="Contraseña">
<button type="button" onclick="togglePass('loginPass')">👁</button>
</div>

<button onclick="loginUsuario()">Iniciar sesión</button>

<hr>

<h3>Registrarse</h3>

<input id="regUser" placeholder="Usuario">
<div class="password-box">
<input id="regPass" type="password" placeholder="Contraseña">
<button type="button" onclick="togglePass('regPass')">👁</button>
</div>

<input type="file" id="regFoto">

<button onclick="registrarUsuario()">Crear cuenta</button>

<button onclick="cerrarLoginUsuario()">Cancelar</button>

</div>

</div>
  
  <!-- ====================================== -->
  <!-- ⚙ PANEL ADMIN GLOBAL -->
  <!-- ====================================== -->

  <div id="adminGlobalPanel" class="admin-global hidden">
    <button onclick="crearCatalogo()">➕ Agregar Nuevo Catálogo</button>
  </div>

  <!-- ====================================== -->
<!-- 🛒 MODAL CARRITO -->
<!-- ====================================== -->

<div id="carritoModal" class="modal">

<div class="modal-content">

<h2>Carrito</h2>

<div id="carritoLista"></div>

<h3 id="carritoTotal"></h3>

<button onclick="enviarPedido()">Enviar pedido</button>

<button onclick="cerrarCarrito()">Cerrar</button>

</div>

</div>

  <!-- ====================================== -->
<!-- ❤️ MODAL FAVORITOS -->
<!-- ====================================== -->

<div id="favoritosModal" class="modal">

<div class="modal-content">

<h2>Favoritos</h2>

<div id="favoritosLista"></div>

<button onclick="cerrarFavoritos()">Cerrar</button>

</div>

</div>

  <!-- ====================================== -->
<!-- 👤 MODAL PERFIL -->
<!-- ====================================== -->

<div id="perfilModal" class="modal">

<div class="modal-content">

<h2>Perfil</h2>

<input id="perfilNombre" placeholder="Nombre">

<input type="file" id="perfilFoto">

<div class="password-box">
<input type="password" id="perfilPassActual" placeholder="Contraseña actual">
<button type="button" onclick="togglePass('perfilPassActual')">👁</button>
</div>

<div class="password-box">
<input type="password" id="perfilPassNueva" placeholder="Nueva contraseña">
<button type="button" onclick="togglePass('perfilPassNueva')">👁</button>
</div>

<div class="password-box">
<input type="password" id="perfilPassConfirmar" placeholder="Confirmar contraseña">
<button type="button" onclick="togglePass('perfilPassConfirmar')">👁</button>
</div>

<button onclick="guardarPerfil()">Guardar cambios</button>

<button onclick="cerrarPerfil()">Cerrar</button>

</div>

</div>

  <!-- ====================================== -->
<!-- 📜 MODAL HISTORIAL -->
<!-- ====================================== -->

<div id="historialModal" class="modal">

<div class="modal-content">

<h2>Historial de pedidos</h2>

<div id="historialLista"></div>

<button onclick="cerrarHistorial()">Cerrar</button>

</div>

</div>
  
  <!-- ====================================== -->
  <!-- 📦 CONTENIDO PRINCIPAL -->
  <!-- ====================================== -->

  <main id="catalogos"></main>

  <!-- ====================================== -->
  <!-- ☁ SUPABASE -->
  <!-- ====================================== -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>

    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    window.supabaseClient = supabaseClient;
  </script>

  <!-- SCRIPT PRINCIPAL -->
  <script src="script.js" defer></script>

</body>

</html>
